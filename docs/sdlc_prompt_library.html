<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>SDLC Prompt Library</title>
  <link href="css/styles.css" rel="stylesheet">
  <style>
    body { margin:0; }
    .container { max-width:1100px; margin:32px auto; padding:0 16px 64px; }
    h1 { margin:0 0 6px; }
    .subtitle { color:var(--muted); margin-bottom:20px; }
    .controls { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:20px; }
    select, input { padding:8px 10px; border-radius:10px; border:1px solid #ccc; }
    .grid { display:grid; gap:16px; grid-template-columns: repeat(auto-fill, minmax(260px,1fr)); }
    .card { padding:14px; cursor:pointer; }
    .title { font-weight:700; margin-bottom:6px; }
    .badge { display:inline-block; margin-bottom:8px; }
    .preview { font-size:13px; color:#374151; }
    .expanded { grid-column:1/-1; cursor:default; }
    .section { margin-bottom:12px; }
    .section-title { font-weight:600; font-size:13px; margin-bottom:4px; }
    .section-body { white-space:pre-wrap; font-size:13px; }
    .actions { display:flex; gap:8px; margin-top:10px; }
    button { padding:6px 10px; }
  </style>
</head>
<body>
  <div class="container">
    <h1>SDLC Prompt Library</h1>
    <div class="subtitle">Browse reusable prompts across software development roles.</div>

    <div class="controls">
      <select id="frameworkFilter">
        <option value="all">All frameworks</option>
        <option value="10-step">10-step</option>
        <option value="COSTAR">COSTAR</option>
        <option value="CRISPE">CRISPE</option>
        <option value="RTF">RTF</option>
      </select>
      <input id="searchInput" placeholder="Search role..." />
    </div>

    <div id="grid" class="grid"></div>
  </div>

  <script>
    const FILES = [
      '01_architect.json','02_developer.json','03_debugger.json',
      '04_reviewer.json','05_refactorer.json','06_tester.json','07_documenter.json'
    ];

    const BASE = 'sdlc_prompt_library/';
    const grid = document.getElementById('grid');
    const filter = document.getElementById('frameworkFilter');
    const search = document.getElementById('searchInput');

    let cards = [];
    let expandedId = null;

    function titleFromFile(file) {
      const name = file.split('_')[1].replace('.json','');
      return name.charAt(0).toUpperCase() + name.slice(1);
    }

    async function loadAll() {
      const res = await Promise.all(FILES.map(f => fetch(BASE + f).then(r => r.json())));
      cards = res.map((d,i) => ({
        id: FILES[i],
        title: `${i+1}. The ${titleFromFile(FILES[i])}`,
        framework: d.framework,
        prompt: d.prompt,
        preview: (Object.values(d.prompt)[0] || '').slice(0,120)
      }));
      render();
    }

    function render() {
      const f = filter.value;
      const q = search.value.toLowerCase();
      grid.innerHTML = '';

      cards
        .filter(c => (f==='all'||c.framework===f))
        .filter(c => c.title.toLowerCase().includes(q))
        .forEach(c => {
          const el = document.createElement('div');
          el.className = 'card';

          if (expandedId === c.id) {
            el.classList.add('expanded');
            el.appendChild(renderExpanded(c));
          } else {
            el.innerHTML = `
              <div class="title">${c.title}</div>
              <div class="badge">${c.framework}</div>
              <div class="preview">${c.preview}...</div>
            `;
            el.onclick = () => {
              expandedId = c.id;
              render();
            };
          }
          grid.appendChild(el);
        });
    }

    function renderExpanded(c) {
      const wrapper = document.createElement('div');

      const title = document.createElement('div');
      title.className = 'title';
      title.textContent = c.title;

      const badge = document.createElement('div');
      badge.className = 'badge';
      badge.textContent = c.framework;

      const sections = document.createElement('div');

      function getLabel(framework, key) {
        const maps = {
          'CRISPE': {
            capacity: 'Capacity & Role (CR)',
            insight: 'Insights (I)',
            statement: 'Statement (S)',
            personality: 'Personality (P)',
            experiment: 'Experiment (E)'
          },
          'COSTAR': {
            context: 'Context',
            objective: 'Objective',
            style: 'Style',
            tone: 'Tone',
            audience: 'Audience',
            response: 'Response'
          },
          'RTF': {
            role: 'Role',
            task: 'Task',
            format: 'Format'
          },
          '10-step': {
            context: '1. Task context',
            tone: '2. Tone context',
            background: '3. Background data, documents, and images',
            details: '4. Detailed task description & rules',
            examples: '5. Examples',
            history: '6. Conversation history',
            request: '7. Immediate task description or request',
            thinking: '8. Thinking step by step',
            output: '9. Output formatting',
            prefilled: '10. Prefilled response'
          }
        };

        return (maps[framework] && maps[framework][key]) || key;
      }

      Object.entries(c.prompt).forEach(([k,v]) => {
        const s = document.createElement('div');
        s.className = 'section';

        const st = document.createElement('div');
        st.className = 'section-title';
        st.textContent = getLabel(c.framework, k);

        const sb = document.createElement('div');
        sb.className = 'section-body';
        sb.textContent = v;

        s.appendChild(st);
        s.appendChild(sb);
        sections.appendChild(s);
      });

      const actions = document.createElement('div');
      actions.className = 'actions';

      const copyBtn = document.createElement('button');
      copyBtn.textContent = 'Copy';
      copyBtn.onclick = async () => {
        try { await navigator.clipboard.writeText(getText(c.prompt)); } catch {}
      };

      const closeBtn = document.createElement('button');
      closeBtn.textContent = 'Close';
      closeBtn.onclick = () => {
        expandedId = null;
        render();
      };

      actions.appendChild(copyBtn);
      actions.appendChild(closeBtn);

      wrapper.appendChild(title);
      wrapper.appendChild(badge);
      wrapper.appendChild(sections);
      wrapper.appendChild(actions);

      return wrapper;
    }

    function getText(prompt) {
      return Object.values(prompt).join('\n\n');
    }

    filter.onchange = render;
    search.oninput = render;

    loadAll();
  </script>
</body>
</html>
