version: 2
updates:
- package-ecosystem: maven
  directories:
    - "/ch01/java"
    - "/ch02/java"
    - "/ch04/java/function_calling"
    - "/ch04/java/mcp_server"
    - "/ch05/java"
    - "/ch06/java"
    - "/ch10/spring_ai/basic_assistant"
    - "/ch10/spring_ai/rag_retrieval"
    - "/ch10/spring_ai/structured_output"
    - "/ch10/spring_ai/tool_use"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: gradle
  directories:
    - "/ch04/java/mcp_server"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: npm
  directories:
    - "/ch01/javascript/anthropic-claude-basic"
    - "/ch01/javascript/google-gemini-basic"
    - "/ch01/javascript/openai-gpt-basic"
    - "/ch02/javascript/anthropic-claude-system-prompt"
    - "/ch02/javascript/google-gemini-system-prompt"
    - "/ch02/javascript/openai-gpt-system-prompt"
    - "/ch04/javascript/function_calling"
    - "/ch04/javascript/mcp_server"
    - "/ch05/javascript/mem0_chat"
    - "/ch05/javascript/session_state_chat"
    - "/ch05/javascript/workflow_state_handoff"
    - "/ch06/javascript/few-shot-ticket-normalizer"
    - "/ch06/javascript/prompt-chaining-support-reply"
    - "/ch10/ai_sdk/basic_text_generation"
    - "/ch10/ai_sdk/streaming_text"
    - "/ch10/ai_sdk/structured_output"
    - "/ch10/ai_sdk/tool_use"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99

- package-ecosystem: github-actions
  directory: "/"
  schedule:
    interval: daily
    time: '06:00'
  open-pull-requests-limit: 99
